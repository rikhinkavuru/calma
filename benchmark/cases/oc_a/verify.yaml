{
  "run": {
    "entrypoint": "gen.py",
    "network": "off",
    "cwd": "."
  },
  "env": {
    "ecosystem": "auto",
    "trust": "own-code"
  },
  "artifacts": [
    {
      "path": "runs/returns.csv",
      "columns": {
        "gross_return": {
          "tag": "return",
          "dtype": "float",
          "na_policy": "error"
        },
        "turnover": {
          "tag": "ignore",
          "dtype": "float",
          "na_policy": "error"
        }
      }
    }
  ],
  "metrics": [
    {
      "metric_id": "total_return",
      "artifact": "runs/returns.csv",
      "binding": {
        "return": "gross_return"
      },
      "convention": null,
      "claimed_value": 0.0791,
      "claimed_precision": 0.0005,
      "headline": true,
      "binding_status": "independently-bound",
      "claim_confirmed": true
    }
  ],
  "baselines": [],
  "costs": {
    "fee_bps": 20.0,
    "turnover_col": "turnover"
  }
}