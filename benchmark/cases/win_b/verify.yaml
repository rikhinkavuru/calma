{
  "run": {
    "entrypoint": "gen.py",
    "network": "off",
    "cwd": "."
  },
  "env": {
    "ecosystem": "auto",
    "trust": "own-code"
  },
  "artifacts": [
    {
      "path": "runs/returns.csv",
      "columns": {
        "date": {
          "tag": "ignore",
          "dtype": "float",
          "na_policy": "error"
        },
        "daily_return": {
          "tag": "return",
          "dtype": "float",
          "na_policy": "error"
        }
      }
    }
  ],
  "metrics": [
    {
      "metric_id": "total_return",
      "artifact": "runs/returns.csv",
      "binding": {
        "return": "daily_return"
      },
      "convention": null,
      "claimed_value": 0.0077,
      "claimed_precision": 0.0005,
      "headline": true,
      "binding_status": "independently-bound",
      "claim_confirmed": true
    }
  ],
  "baselines": [],
  "claimed_window": [
    "2015-01-01",
    "2024-12-31"
  ]
}