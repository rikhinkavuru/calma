{
  "run": {
    "entrypoint": "gen.py",
    "network": "off",
    "cwd": "."
  },
  "env": {
    "ecosystem": "auto",
    "trust": "own-code"
  },
  "artifacts": [
    {
      "path": "runs/preds.csv",
      "columns": {
        "y_pred": {
          "tag": "prediction",
          "dtype": "int",
          "na_policy": "error"
        },
        "y_true": {
          "tag": "label",
          "dtype": "int",
          "na_policy": "error"
        }
      }
    }
  ],
  "metrics": [
    {
      "metric_id": "accuracy",
      "artifact": "runs/preds.csv",
      "binding": {
        "prediction": "y_pred",
        "label": "y_true"
      },
      "convention": null,
      "claimed_value": 0.885,
      "claimed_precision": 0.005,
      "headline": true,
      "binding_status": "independently-bound",
      "claim_confirmed": true
    }
  ],
  "baselines": [],
  "pipeline": {
    "fit_on": "train+test",
    "transform": "StandardScaler",
    "leaked_metric": 0.885,
    "train_only_metric": 0.765
  }
}