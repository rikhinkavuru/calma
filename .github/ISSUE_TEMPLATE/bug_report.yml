name: Bug report
description: A verdict, recompute, or CLI/MCP behavior that looks wrong
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. If this is a **security vulnerability**, do not file it here — see
        [SECURITY.md](https://github.com/rikhinkavuru/calma/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did Calma do, and what did you expect instead?
      placeholder: "calma verify ./out returned REFUTED, but the number is correct because…"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: The exact command(s) and, if possible, a minimal result directory or `verify.yaml`.
      render: shell
    validations:
      required: true
  - type: textarea
    id: verdict
    attributes:
      label: The verdict / output
      description: Paste the full output (or `--json`). Run `--why` for the complete scope list.
      render: shell
  - type: input
    id: surface
    attributes:
      label: Surface
      description: CLI, Claude Code hook, MCP, PR bot, hosted dashboard, or the engine directly?
      placeholder: "CLI (calma verify)"
  - type: input
    id: version
    attributes:
      label: Version + OS
      description: Output of `calma --version`, plus your OS and Python version.
      placeholder: "calma 0.12.0 · macOS 15 · Python 3.12"
    validations:
      required: true
