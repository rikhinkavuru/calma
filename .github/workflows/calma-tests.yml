name: calma-tests
# Least-privilege GITHUB_TOKEN (audit 2026-06-24): default to read-only.
permissions:
  contents: read
on: [push, pull_request, workflow_dispatch]
jobs:
  test:
    runs-on: macos-latest   # macOS Seatbelt own-code tier; the suite is green on macOS.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (SHA-pinned)
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5 (SHA-pinned)
        with: { python-version: "3.12" }
      - name: Run Calma test suite (pure stdlib, no deps)
        run: python3 .claude/skills/calma/scripts/tests/run_all.py

  # Native-Linux own-code tier (bubblewrap, no daemon). Proves the CAVEAT cap LIFTS on Linux:
  # `calma doctor` must stamp bwrap-verified (zero leaks under bwrap), and the full suite - now
  # exercising the live bwrap doctor + hostile marquee - stays green.
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (SHA-pinned)
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5 (SHA-pinned)
        with: { python-version: "3.12" }
      - name: Install bubblewrap + allow unprivileged user namespaces
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap
          # Ubuntu 24.04 ships AppArmor unprivileged-userns restriction ON; bwrap is unprivileged,
          # so allow it (a clean older-Linux host permits this by default). If this ever cannot be
          # granted, the doctor honestly stamps host-not-isolated and the assert below fails LOUD -
          # the stamp never lies.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          bwrap --version
      - name: Assert the Linux own-code tier verifies (the CAVEAT cap lifts)
        run: |
          set -e
          python3 .claude/skills/calma/scripts/run_hermetic.py doctor \
            --base .claude/skills/calma/assets/btc --isolation bwrap | tee /tmp/bwrap_doctor.json
          tier=$(python3 -c "import json;print(json.load(open('/tmp/bwrap_doctor.json'))['tier'])")
          if [ "$tier" != "bwrap-verified" ]; then
            echo "EXPECTED bwrap-verified, got: $tier (the native Linux tier did not verify on this runner)"
            exit 1
          fi
          echo "Linux own-code tier verified: $tier"
      - name: Run the full Calma test suite on Linux (live bwrap doctor + marquee + cross-language)
        # The full run_all.py on a real Linux runner: the isolation tier (live bwrap probe, hostile
        # marquee, --cap-drop ALL, seccomp denials, /proc/sys read-only, resource bounds, C-compile) plus
        # the cross-language suite (incl. a $HOME-rooted rustup Rust toolchain, now resolved by the bwrap
        # depot re-allow - parity with the Seatbelt depot binds).
        run: python3 .claude/skills/calma/scripts/tests/run_all.py

  # the shipped Action must actually work for a consumer: the flagship fixture
  # is a known REFUTED, so the action step is EXPECTED to fail (claim broken).
  action:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (SHA-pinned)
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5 (SHA-pinned)
        with: { python-version: "3.12" }
      - name: Verify the BTC fixture via the action (expected REFUTED)
        id: btc
        uses: ./.github/actions/calma
        continue-on-error: true
        with:
          target: .claude/skills/calma/assets/btc
          fail_on: refuted
      - name: Assert the action refuted the known-broken claim
        run: |
          if [ "${{ steps.btc.outcome }}" != "failure" ]; then
            echo "expected the action to fail on the REFUTED fixture, got: ${{ steps.btc.outcome }}"
            exit 1
          fi
      - name: Exercise the claim-input quoting path (spaces, %, comma must not crash the shell)
        id: quoting
        uses: ./.github/actions/calma
        continue-on-error: true   # still the REFUTED fixture - failure is the correct verdict
        with:
          target: .claude/skills/calma/assets/btc
          claim: "+14,698% backtest"
          fail_on: refuted
      - name: Assert the quoted claim reached the verifier (exit 1 = REFUTED, not 2 = CLI error)
        run: |
          set +e
          python3 .claude/skills/calma/scripts/calma.py verify .claude/skills/calma/assets/btc "+14,698% backtest" --fail-on refuted
          code=$?
          if [ "$code" -ne 1 ]; then
            echo "expected exit 1 (REFUTED), got $code"
            exit 1
          fi
