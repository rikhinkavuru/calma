# CodeQL static analysis of the repo's OWN GitHub Actions - a guardrail for the PR bot's security model.
# `languages: actions` flags Untrusted-Checkout (pwn requests) and script-injection (PR-controlled values
# expanded into a shell), exactly the two failure modes the two-workflow split is designed to avoid.
name: codeql-actions

on:
  push:
    branches: [main]
    paths: [".github/workflows/**", ".github/actions/**"]
  pull_request:
    branches: [main]
    paths: [".github/workflows/**", ".github/actions/**"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: actions
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
