# Publish `calma` to PyPI via OpenID Connect "trusted publishing" — no API token / password stored.
# Configure the trusted publisher once at https://pypi.org/manage/account/publishing/ with:
#   project: calma · owner: rikhinkavuru · repo: calma · workflow: publish-pypi.yml · environment: pypi
# Then publish by creating a GitHub Release (or running this workflow manually). The version comes from
# the engine's __version__ (pyproject [tool.hatch.version]) — bump it before tagging a release.
name: Publish to PyPI
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (SHA-pinned)
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5 (SHA-pinned)
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check the artifacts
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4 (SHA-pinned)
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # the GitHub Actions environment named in the trusted-publisher config
    permissions:
      id-token: write          # OIDC — mints the short-lived token PyPI trusts; nothing is stored
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4 (SHA-pinned)
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1 (SHA-pinned)
