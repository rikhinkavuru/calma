name: calma-package
# Least-privilege GITHUB_TOKEN (audit 2026-06-24): build+smoke-test only, no write scope needed.
permissions:
  contents: read
# WS-B: continuously validate the INSTALLED ARTIFACT (not the working copy). Build the wheel, install it in
# a CLEAN venv (which forces the bundled calma/_engine/, with no source tree on the path), and smoke-test the
# library API + the console script + the firewall + the optional parquet extra. This is what a customer's
# `pip install calma` actually runs in their CI.
on:
  push:
    paths:
      - "pyproject.toml"
      - "src/calma/**"
      - ".claude/skills/calma/scripts/**"
      - ".github/workflows/calma-package.yml"
  workflow_dispatch:

jobs:
  wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (SHA-pinned)
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5 (SHA-pinned)
        with: { python-version: "3.12" }
      - name: build the wheel
        run: python -m pip install --quiet build && python -m build --wheel
      - name: install the wheel in a CLEAN venv (forces the bundled engine; no source tree on the path)
        run: python -m venv /tmp/v && /tmp/v/bin/pip install --quiet dist/calma-*.whl
      - name: smoke — library API + console + THE FIREWALL (zero third-party reachable from the core)
        run: |
          /tmp/v/bin/python - <<'PY'
          import sys, calma
          leaked = [m for m in ("pyarrow", "numpy", "pandas", "scipy", "sklearn") if m in sys.modules]
          assert not leaked, "FIREWALL LEAK: %s reachable from the installed core" % leaked
          assert all(hasattr(calma, a) for a in ("verify", "recompute", "draft")), "missing public API"
          print("calma", calma.__version__, "| firewall clean | API present")
          PY
          /tmp/v/bin/calma --version
          /tmp/v/bin/calma demo
      - name: the parquet EXTRA installs and the core firewall still holds (pyarrow stays lazy)
        run: |
          python -m venv /tmp/vp && /tmp/vp/bin/pip install --quiet "$(ls dist/calma-*.whl)[parquet]"
          /tmp/vp/bin/python - <<'PY'
          import sys, calma
          assert "pyarrow" not in sys.modules, "pyarrow must NOT be imported just by importing calma (lazy)"
          import pyarrow  # but it IS installed by the extra
          print("calma[parquet] installs pyarrow", pyarrow.__version__, "yet the core import stays lazy/clean")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with: { name: calma-wheel, path: dist/*.whl }
