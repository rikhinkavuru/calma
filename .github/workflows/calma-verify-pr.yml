# UNPRIVILEGED half of the pwn-request-proof two-workflow pattern (GitHub Security Lab). Triggered by
# `pull_request`, so a FORK PR here gets a READ-ONLY token and NO secrets - re-executing the PR's
# (untrusted) code is safe because the engine sandboxes it network-off (Seatbelt/bwrap/microVM). This
# job writes a findings ARTIFACT and posts NOTHING; the privileged comment job (workflow_run) does the
# writing. NEVER use pull_request_target + a head checkout (that is the pwn request).
name: calma-verify-pr

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read          # read-only; a fork PR gets no secrets and cannot use the token to write

jobs:
  verify:
    runs-on: ubuntu-latest
    # backstop on a job that RE-EXECUTES untrusted PR code (the engine per-target timeout + the
    # changed-target cap are the primary bounds; this caps total runaway/abuse). Tune up if a repo
    # legitimately verifies many heavy targets per PR.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (SHA-pinned: tags are mutable)
        with:
          persist-credentials: false                      # the PR's code can never use the token
          ref: ${{ github.event.pull_request.head.sha }}  # the PR head (the code under test)
          fetch-depth: 0                                  # need base..head for the diff
      # TRUSTED engine + driver = the PR BASE (the target-branch state a PR cannot modify). The verify
      # step runs THIS copy of pr/ + the engine against the PR's result dirs, so a PR cannot swap in its
      # own engine to forge a verdict - only its RESULT DIRS (in the default workspace) are PR-controlled.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (SHA-pinned)
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
          path: .calma-engine
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'
      - name: detect changed result dirs, re-verify each in the engine sandbox, write the bundle
        # PR-controlled values reach the script via env ONLY - never macro-expanded into the shell line
        # (no `${{ github.event.* }}` inside `run:`, so a crafted branch/title can't inject a command).
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          RUNNER_TEMP: ${{ runner.temp }}
        # run the TRUSTED, base-pinned run_pr.py + engine (.calma-engine) against the PR's result dirs in
        # the default workspace - never the PR's own copy of the verifier (see SECURITY.md, docs/pr-bot.md).
        run: python3 "$GITHUB_WORKSPACE/.calma-engine/pr/run_pr.py"
      - name: upload the findings bundle for the privileged comment job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4 (SHA-pinned)
        with:
          name: calma-findings
          path: ${{ runner.temp }}/calma-findings.json   # carries pr_number + head_sha (read there)
          if-no-files-found: error
          retention-days: 1
