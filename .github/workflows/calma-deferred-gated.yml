name: calma-deferred-gated
# T2: the deferred arms that need secrets / heavy deps. MANUAL trigger only (workflow_dispatch) so
# they're documented + runnable on demand, never silently skipped. The OFFLINE halves (mock agent
# plumbing, contract validation, draft --ai fallback) run every push via calma-test-all.
on:
  workflow_dispatch:
    inputs:
      run_real_agent:
        description: "Run the REAL benchmark agent arm (needs ANTHROPIC_API_KEY secret)"
        type: boolean
        default: false
      run_framework_vectors:
        description: "Generate + check framework reference vectors (installs the frameworks)"
        type: boolean
        default: false

jobs:
  real-agent-arm:
    if: ${{ inputs.run_real_agent }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (SHA-pinned)
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5 (SHA-pinned)
        with: { python-version: "3.12" }
      - name: D2 real agent arm (records instability / cost / latency)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          test -n "$ANTHROPIC_API_KEY" || { echo "ANTHROPIC_API_KEY secret not set"; exit 1; }
          python3 benchmark/run_agent.py --k 3 --limit 12
          python3 benchmark/score.py
      - uses: actions/upload-artifact@v4
        with: { name: agent-results, path: benchmark/results/agent*.json }

  framework-vectors:
    if: ${{ inputs.run_framework_vectors }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [sklearn, xgboost]   # extend as generators land (backtrader/vectorbt/zipline/pytorch)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (SHA-pinned)
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5 (SHA-pinned)
        with: { python-version: "3.12" }
      - name: install ${{ matrix.framework }} + numpy
        run: python3 -m pip install --quiet numpy ${{ matrix.framework }}
      - name: C4 framework-generated reference vectors (assert recompute matches to <=1e-9)
        run: |
          echo "Generator for ${{ matrix.framework }} goes here: produce the artifact with the"
          echo "framework, freeze it, and assert Calma's recompute matches the framework's own number"
          echo "to <=1e-9 (see docs/frameworks.md 'Reference vectors')."
          # python3 benchmark/gen_framework_vectors.py --framework ${{ matrix.framework }}
