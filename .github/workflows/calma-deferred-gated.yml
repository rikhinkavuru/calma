name: calma-deferred-gated
# Least-privilege GITHUB_TOKEN (audit 2026-06-24): default to read-only.
permissions:
  contents: read
# T2: the deferred arms that need secrets / heavy deps. MANUAL trigger only (workflow_dispatch) so
# they're documented + runnable on demand, never silently skipped. The OFFLINE halves now carry real
# EVIDENCE every push via calma-test-all (test_deferred_arms.py): the recompute-only baseline MEASURES
# the agent arm's validity-blindness gap, and gen_framework_vectors.py asserts Calma reproduces each
# framework's frozen golden number to <=1e-9. These gated jobs ADD the live confirmations: the real LLM
# agent run, and golden==live-framework (--check-live).
on:
  workflow_dispatch:
    inputs:
      run_real_agent:
        description: "Run the REAL benchmark agent arm (needs ANTHROPIC_API_KEY secret)"
        type: boolean
        default: false
      run_framework_vectors:
        description: "Generate + check framework reference vectors (installs the frameworks)"
        type: boolean
        default: false

jobs:
  real-agent-arm:
    if: ${{ inputs.run_real_agent }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (SHA-pinned)
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5 (SHA-pinned)
        with: { python-version: "3.12" }
      - name: D2 real agent arm (records instability / cost / latency)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          test -n "$ANTHROPIC_API_KEY" || { echo "ANTHROPIC_API_KEY secret not set"; exit 1; }
          python3 benchmark/run_agent.py --k 3 --limit 12
          python3 benchmark/score.py
      - uses: actions/upload-artifact@v4
        with: { name: agent-results, path: benchmark/results/agent*.json }

  framework-vectors:
    if: ${{ inputs.run_framework_vectors }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (SHA-pinned)
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5 (SHA-pinned)
        with: { python-version: "3.12" }
      - name: install the reference frameworks
        # scikit-learn covers the classification/regression goldens (the canonical scorer xgboost/pytorch
        # users call); numpy gives an independent reduction order for the quant total_return golden. The
        # backtrader/vectorbt/zipline headline (compounded return) reduces to that same closed form.
        run: python3 -m pip install --quiet numpy scikit-learn
      - name: C4 framework reference vectors - confirm the frozen goldens equal the LIVE frameworks
        run: |
          # Offline, every push already asserts Calma == the frozen golden (<=1e-9). With the frameworks
          # installed, --check-live additionally asserts golden == the REAL framework number (<=1e-9),
          # closing the loop: Calma == frozen golden == live framework. Non-zero exit on any mismatch.
          python3 benchmark/gen_framework_vectors.py --check-live
      - uses: actions/upload-artifact@v4
        with: { name: framework-vectors, path: benchmark/results/framework_vectors.json }
