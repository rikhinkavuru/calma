# D11-03 / D5-02: software-composition-analysis gate + SBOM (OpenSSF Scorecard Dependency-Update + SBOM).
# pip-audit is BLOCKING on the control-plane + signing-path deps (cryptography/e2b/boto3 live here); npm
# audit is BLOCKING too (the postcss>=8.5.6 override cleared the only finding — `npm audit` now 0 vulns).
name: calma-sca
on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC
  workflow_dispatch:
permissions:
  contents: read
jobs:
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: pip-audit (control-plane + api deps) — BLOCKING
        run: |
          python -m pip install --upgrade pip pip-audit cyclonedx-bom
          pip-audit -r requirements.txt --strict
          pip-audit -r api/requirements.txt --strict
      - name: SBOM (CycloneDX)
        run: |
          cyclonedx-py requirements requirements.txt -o sbom-control-plane.cdx.json || true
          cyclonedx-py requirements api/requirements.txt -o sbom-api.cdx.json || true
      - name: npm audit (dashboard) — BLOCKING
        run: npm audit --audit-level=high
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom-*.cdx.json
          if-no-files-found: ignore
