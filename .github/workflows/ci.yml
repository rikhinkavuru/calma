name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install deps
        run: python -m pip install --quiet numpy scikit-learn pandas scipy pyyaml pytest
      - name: run the spike test suite
        run: python -m pytest spike/tests -q
