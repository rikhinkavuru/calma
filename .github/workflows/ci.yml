name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install deps
        # fastapi+httpx are needed by test_server_auth (spike/server.py); without them CI was red on every
        # commit. NOT installing e2b on purpose: test_e2b_runner skips when e2b is absent — installing it
        # would make those tests attempt real sandbox calls (no creds in CI) and fail.
        run: python -m pip install --quiet numpy scikit-learn pandas scipy pyyaml pytest fastapi httpx
      - name: run the spike test suite
        run: python -m pytest spike/tests -q
