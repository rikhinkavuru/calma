name: calma-test-all
# T1: one workflow runs ALL THREE layers as SEPARATE jobs, so a red transport layer is legible
# (the old `calma-tests` workflow ran only the pure-stdlib core - mcp/ and pr/ were "out of band").
# Least-privilege GITHUB_TOKEN (audit 2026-06-24): default to read-only.
permissions:
  contents: read
on: [push, pull_request, workflow_dispatch]
jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (SHA-pinned)
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5 (SHA-pinned)
        with: { python-version: "3.12" }
      - name: Install bubblewrap + allow unprivileged user namespaces
        # the suite includes sandbox-dependent tests (hook / dx / agent-arm) that need a verified
        # isolation tier to produce a real REFUTED; ubuntu-latest has no seatbelt, so without bwrap
        # those tests can't isolate and false-fail. Mirror the test-linux job's native-Linux tier.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: core (pure stdlib, no deps)
        run: python3 .claude/skills/calma/scripts/tests/run_all.py

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (SHA-pinned)
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5 (SHA-pinned)
        with: { python-version: "3.12" }
      - name: mcp transport tests (mcp SDK + pytest)
        run: |
          # anthropic + jsonschema are the edges A1 deps so calma_verify_artifact's `python -m
          # edges.extract` seam runs against the committed REPLAY fixtures (CALMA_EDGES_RECORD unset
          # => offline replay, no API key). Without them that test fails "engine produced no JSON".
          python3 -m pip install --quiet pytest numpy "anthropic>=0.40,<2" "jsonschema>=4.18,<5" -e ./mcp
          PYTHONPATH="$PWD/mcp" python3 -m pytest -q mcp/tests

  pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (SHA-pinned)
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5 (SHA-pinned)
        with: { python-version: "3.12" }
      - name: pr transport tests (pytest + numpy)
        run: |
          python3 -m pip install --quiet pytest numpy
          python3 -m pytest -q pr/tests
