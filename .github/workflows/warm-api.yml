name: Warm API

# Keep the Python verifications API warm. A cold start is ~4.5s and gates the dashboard's first data
# load (and provision-at-login). Vercel Hobby caps crons at once/day, so we ping /healthz from GitHub
# Actions instead — free on this public repo. The request itself spins the function up regardless of
# the response, so warming works even if a deploy is mid-flight.
#
# Caveat: GitHub's scheduled runs are best-effort and get delayed/coalesced under load, so real cadence
# is closer to every 5-15 min than exactly 5. For strict 5-min warming, also point cron-job.org at the
# same URL (see the repo notes) — this workflow and an external pinger can run side by side.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# No repo access needed — this only makes an outbound HTTP request.
permissions: {}

# Let a slow run finish rather than stacking pings.
concurrency:
  group: warm-api
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /healthz
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 45 \
            https://calma-api-wheat.vercel.app/healthz || echo "000")
          echo "healthz -> $code (the request warms the function regardless of status)"
