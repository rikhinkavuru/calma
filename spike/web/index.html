<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calma — the correctness layer</title>
<style>
  :root{
    --bg:#fbfbfa; --panel:#ffffff; --ink:#1a1a18; --muted:#6b6b66; --line:#ececea;
    --accent:#1a1a18; --brand:#3b5bdb;
    --green:#1f9d55; --green-bg:#e9f7ef; --red:#d6336c; --red-bg:#fdeef3;
    --amber:#e8590c; --amber-bg:#fdf0e6; --purple:#6741d9; --purple-bg:#f0ecfb;
    --blue:#1c7ed6; --blue-bg:#e7f2fc; --slate:#6b6b66; --slate-bg:#f2f2f0;
    --radius:12px; --shadow:0 1px 2px rgba(0,0,0,.04),0 1px 12px rgba(0,0,0,.03);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:"Archivo",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  /* sidebar */
  .side{border-right:1px solid var(--line);padding:20px 14px;display:flex;flex-direction:column;gap:4px;
    position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
  .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#1a1a18,#3b5bdb);
    display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px}
  .brand b{font-size:16px;letter-spacing:-.01em}
  .nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;color:var(--muted);
    text-decoration:none;font-weight:500;cursor:pointer}
  .nav a.active,.nav a:hover{background:#f4f4f2;color:var(--ink)}
  .side .foot{margin-top:auto;font-size:12px;color:var(--muted);padding:10px 8px;border-top:1px solid var(--line)}
  /* main */
  .main{padding:30px 38px;max-width:1100px}
  h1{font-size:24px;margin:0 0 2px;letter-spacing:-.02em}
  .sub{color:var(--muted);margin:0 0 24px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card.pad{padding:22px}
  .row{display:flex;gap:12px;align-items:center}
  .grow{flex:1}
  label.f{display:block;font-weight:600;font-size:12.5px;margin:0 0 6px;color:#33332f}
  input[type=text],select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;
    font:inherit;background:#fff;color:var(--ink)}
  input[type=text]:focus,select:focus{outline:none;border-color:#c7cdfa;box-shadow:0 0 0 3px #edf0fe}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:9px;padding:10px 18px;font:inherit;
    font-weight:600;cursor:pointer;white-space:nowrap}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .toggle{display:flex;align-items:center;gap:8px;font-weight:500;color:#33332f;cursor:pointer;user-select:none}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;cursor:pointer;
    font-size:12.5px;display:flex;gap:7px;align-items:center}
  .chip:hover{border-color:#c7cdfa;background:#f7f8ff}
  .chip .v{color:var(--muted);font-size:11px}
  .muted{color:var(--muted)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px}
  /* stages */
  .stages{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 0}
  .stage{font-size:11.5px;padding:4px 10px;border-radius:999px;background:#f2f2f0;color:var(--muted)}
  .stage.on{background:#eaeefe;color:var(--brand);font-weight:600}
  .stage.done{background:var(--green-bg);color:var(--green)}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid #d8d8d4;border-top-color:var(--brand);
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* summary cards */
  .sumgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:18px 0}
  .sum{padding:16px 18px;border-radius:var(--radius);border:1px solid var(--line);background:#fff}
  .sum .n{font-size:26px;font-weight:700;letter-spacing:-.02em}
  .sum .l{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  /* findings table */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
    font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:last-child td{border-bottom:0}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .CONFIRMED{color:var(--green);background:var(--green-bg)}
  .REFUTED{color:var(--red);background:var(--red-bg)}
  .INVALIDATED{color:var(--amber);background:var(--amber-bg)}
  .NONDET{color:var(--purple);background:var(--purple-bg)}
  .REPRO{color:var(--blue);background:var(--blue-bg)}
  .INCONCLUSIVE,.DISCOVERED{color:var(--slate);background:var(--slate-bg)}
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 12px}
  .filt{font-size:12px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;
    cursor:pointer;color:var(--muted)}
  .filt.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
  .reason{color:var(--muted);font-size:12.5px;max-width:420px}
  .hidden{display:none}
  .logbox{margin-top:12px;max-height:130px;overflow:auto;background:#fafaf8;border:1px solid var(--line);
    border-radius:9px;padding:10px 12px}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .empty.clear{color:var(--green);font-weight:600;font-size:15px}
  .prov{font-size:10px;margin-top:3px;font-weight:700;letter-spacing:.01em}
  .prov.synth{color:var(--purple)}
  .prov.bank{color:var(--blue)}
  .catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px;margin-top:20px}
  .catcard{border:1px solid var(--line);border-radius:12px;padding:16px;background:#fff}
  .catcard.syn{border-color:#e3dbf7;background:#fcfbff}
  .cattag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .cattag.syn{color:var(--purple);background:var(--purple-bg)}
  .cattag.cur{color:var(--slate);background:var(--slate-bg)}
  .banner{padding:13px 16px;border-radius:10px;margin-bottom:16px;font-size:13px;line-height:1.55}
  .banner code{background:rgba(0,0,0,.05);padding:1px 6px;border-radius:5px;font-family:ui-monospace,Menlo,monospace}
  .banner.ok{background:var(--green-bg);color:#176a3a;border:1px solid #cdeeda}
  .banner.warn{background:#fff8e8;color:#8a5a00;border:1px solid #f3e2b8}
  .repolist{max-height:230px;overflow:auto;margin-top:10px;border:1px solid var(--line);border-radius:10px}
  .repoitem{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;cursor:pointer;
    border-bottom:1px solid var(--line)}
  .repoitem:last-child{border-bottom:0}
  .repoitem:hover{background:#f7f8ff}
  .tag{font-size:10.5px;padding:2px 7px;border-radius:6px;background:#f2f2f0;color:var(--muted);font-weight:600}
  .tag.priv{background:#fdeef3;color:var(--red)}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">C</div><b>Calma</b></div>
    <nav class="nav">
      <a id="nav-verify" class="active">◈ &nbsp;Verify</a>
      <a id="nav-catalog">▦ &nbsp;Catalog</a>
      <a class="muted" style="pointer-events:none">⚙ &nbsp;Settings</a>
    </nav>
    <div class="foot">The correctness layer.<br/>Re-run · recompute · prove or break it.</div>
  </aside>

  <main class="main">
    <div id="verifyView">
    <h1>Verify a repository</h1>
    <p class="sub">Connect a repo. Calma finds the numbers it reports, re-runs the work, and recomputes each one — then tells you which hold up.</p>

    <div class="card pad">
      <label class="f" for="repo">GitHub repository</label>
      <div class="row">
        <input id="repo" class="grow" type="text" placeholder="owner/name  or  https://github.com/owner/name" />
        <button id="go" class="btn">Verify</button>
      </div>

      <div class="row" style="margin-top:14px;gap:22px;flex-wrap:wrap">
        <label class="toggle"><input id="discover" type="checkbox" checked /> Auto-discover claims</label>
        <label class="toggle"><input id="deep" type="checkbox" /> Deep verify (re-run)</label>
        <div id="deepopts" class="row hidden" style="gap:10px">
          <input id="entry" type="text" placeholder="entrypoint e.g. eval.py" style="width:200px" />
          <select id="runner" style="width:130px"><option value="local">local</option><option value="e2b">E2B microVM</option></select>
          <input id="pip" type="text" placeholder="pip deps (space-sep)" style="width:180px" />
        </div>
      </div>

      <div class="chips" id="examples">
        <div class="chip" data-repo="sanjaynela/ml-in-10-lines" data-deep="1" data-entry="iris.py" data-pip="scikit-learn">
          ▶ ml-in-10-lines <span class="v">deep · expect REFUTED</span></div>
      </div>

      <div id="repos"></div>
    </div>

    <div id="job" class="card pad hidden" style="margin-top:22px"></div>
    <div id="results" style="margin-top:22px"></div>
    </div>
    <div id="catalogView" class="hidden"></div>
  </main>
</div>
<script src="/app.js"></script>
</body>
</html>
