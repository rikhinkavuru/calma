# Calma verification backend on Fly.io. A persistent single instance (jobs are in-memory MVP, so don't
# scale to zero mid-run). Secrets are set via `flyctl secrets set` (see DEPLOY.md), never committed here.
app = "calma-verify"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  CALMA_FORCE_E2B = "1"   # public backend: every run is isolated in E2B, never on this host

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false      # keep the instance up so in-memory job state survives a verification
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
